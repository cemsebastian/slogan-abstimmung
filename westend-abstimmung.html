<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;font-family:'DM Sans',sans-serif;font-weight:300;color:#111;min-height:100vh}
.header{background:#fff;border-bottom:2px solid #111;padding:18px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}

.center{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100vh - 65px);padding:40px 20px}
.card{background:#fff;border:1.5px solid #e0e0e0;border-radius:16px;padding:36px;width:100%;max-width:520px;box-shadow:0 2px 16px rgba(0,0,0,.06)}
.card-wide{max-width:800px}
h1{font-family:'Syne',sans-serif;font-size:clamp(26px,5vw,40px);font-weight:800;line-height:1.1;margin-bottom:8px}
h2{font-family:'Syne',sans-serif;font-size:21px;font-weight:800;margin-bottom:16px}
.proj-sub{font-size:14px;color:#555;font-style:italic;margin-bottom:24px;line-height:1.5;border-left:3px solid #111;padding-left:12px}
.sub{color:#666;font-size:14px;line-height:1.6;margin-bottom:28px}
label{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:#888;margin-bottom:7px;display:block}
input[type=text],input[type=password],input[type=number],textarea{width:100%;background:#fafafa;border:1.5px solid #ddd;border-radius:10px;padding:12px 15px;color:#111;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;outline:none;transition:border-color .2s;margin-bottom:14px;display:block}
input:focus,textarea:focus{border-color:#111}
textarea{min-height:170px;resize:vertical}
.btn{display:block;width:100%;padding:13px 18px;border-radius:10px;border:none;cursor:pointer;font-family:'Syne',sans-serif;font-size:14px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;transition:all .15s;text-align:center}
.btn-p{background:#111;color:#fff}
.btn-p:hover{background:#333;transform:translateY(-1px)}
.btn-p:disabled{background:#ccc;color:#999;cursor:not-allowed;transform:none}
.btn-g{background:transparent;border:1.5px solid #ddd;color:#666}
.btn-g:hover{border-color:#111;color:#111}
.btn-d{background:transparent;border:1.5px solid #c00;color:#c00}
.btn-d:hover{background:#fff0f0}
.btn-sm{width:auto;padding:8px 15px;font-size:12px}
.btn-row{display:flex;gap:10px}
.btn-row .btn{flex:1}
.vgap{display:flex;flex-direction:column;gap:10px}
.errmsg{background:#fff0f0;border:1.5px solid #fcc;border-radius:8px;padding:11px 15px;color:#c00;font-size:13px;margin-bottom:14px}
.okmsg{background:#f0f8f0;border:1.5px solid #bdb;border-radius:8px;padding:11px 15px;color:#262;font-size:13px;margin-bottom:14px}
.opts{display:flex;flex-direction:column;gap:7px;max-height:420px;overflow-y:auto;padding-right:4px;margin-bottom:18px}
.opts::-webkit-scrollbar{width:4px}
.opts::-webkit-scrollbar-track{background:#f0f0f0}
.opts::-webkit-scrollbar-thumb{background:#ccc;border-radius:2px}
.opt{background:#fafafa;border:1.5px solid #e0e0e0;border-radius:10px;padding:11px 15px;cursor:pointer;text-align:left;color:#111;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;display:flex;align-items:center;gap:11px;transition:all .15s;width:100%}
.opt:hover{border-color:#999;background:#f5f5f5}
.opt.sel{border-color:#111;background:#111;color:#fff}
.opt.dim{opacity:.35;cursor:not-allowed}
.chk{width:20px;height:20px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.opt.sel .chk{background:#fff;border-color:#fff;color:#111;font-weight:700}
.vctr{text-align:center;margin-bottom:18px}
.vctr .big{font-family:'Syne',sans-serif;font-size:30px;font-weight:800;color:#111;display:block}
.vctr .sm{font-size:13px;color:#888}
.rlist{display:flex;flex-direction:column;gap:9px;margin-bottom:22px}
.rrow{display:flex;align-items:center;gap:13px}
.rnk{font-family:'Syne',sans-serif;font-size:11px;font-weight:800;color:#aaa;width:22px;flex-shrink:0}
.rbw{flex:1}
.rlbl{font-size:13px;margin-bottom:4px;display:flex;justify-content:space-between}
.rvts{font-family:'Syne',sans-serif;font-size:11px;font-weight:700;color:#111}
.rbar{height:6px;background:#eee;border-radius:3px;overflow:hidden}
.rfill{height:100%;background:#111;border-radius:3px;transition:width .5s ease}
.rfill.elim{background:#ddd}
.cut{border:none;border-top:1px dashed #ddd;margin:10px 0}
.cutlbl{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#aaa;text-align:center;padding:4px 0}
.stats{display:flex;gap:14px;margin-bottom:22px;flex-wrap:wrap}
.stat{background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:10px;padding:14px;flex:1;min-width:80px;text-align:center}
.stat .n{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;color:#111}
.stat .l{font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:#999;margin-top:3px}
.tabs{display:flex;gap:3px;background:#f0f0f0;border-radius:10px;padding:3px;margin-bottom:20px}
.tabBtn{flex:1;padding:8px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;color:#888;transition:all .15s}
.tabBtn.on{background:#fff;color:#111;font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{background:#f0f0f0;border:1.5px solid #ccc;border-radius:20px;padding:4px 12px;font-size:12px;color:#444}
.wnm{font-family:'Syne',sans-serif;font-size:clamp(22px,4vw,34px);font-weight:800;color:#111;margin:10px 0 6px;word-break:break-word}
.rbadges{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:22px}
.rbadge{font-size:10px;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.06em}
.loading{display:flex;align-items:center;justify-content:center;height:100vh;color:#aaa;font-size:14px}
.picks{background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:10px;padding:15px;margin-bottom:22px;text-align:left}
.picks .plbl{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:#aaa;margin-bottom:9px}
.picks .pitem{font-size:14px;color:#111;margin-bottom:5px}
.round-info{background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:10px;padding:12px 15px;margin-bottom:18px;font-size:13px;color:#555;line-height:1.8}
.round-info strong{color:#111}
@media(max-width:580px){.header{padding:15px 20px}.card{padding:26px 20px}}
</style>

<body>
<div id="root"><div class="loading">Laden...</div></div>
<script>
var VOTES_PER_ROUND = [5, 3, 1];

var S={session:null,votes:{},view:'home',tab:'results',err:'',msg:'',adminMsg:'',voterName:'',selected:[],pinInput:'',setupTitle:'Westend vernetzt Aktionsreihe',setupOptions:'',setupPin:'',loading:true,advancing:false};
function set(p){Object.assign(S,p);draw()}

var sRef=db.ref('westend/session');
function vRef(r){return db.ref('westend/votes/r'+r)}

function currentMaxVotes(){
  if(!S.session)return 1;
  return VOTES_PER_ROUND[S.session.currentRound-1]||1;
}

function loadAll(){
  set({loading:true});
  sRef.once('value').then(function(sn){
    var s=sn.val();
    if(s){
      vRef(s.currentRound).once('value').then(function(vn){
        set({session:s,votes:vn.val()||{},loading:false});
      });
    } else {
      set({session:null,votes:{},loading:false});
    }
  }).catch(function(e){
    set({loading:false,adminMsg:'Fehler beim Laden: '+e.message});
  });
}

function saveS(s){
  return sRef.set(s).then(function(){
    set({session:s});
  });
}
function saveV(v,r){
  return vRef(r).set(v).then(function(){set({votes:v})});
}

function doCreate(){
  var opts=S.setupOptions.split('\n').map(function(x){return x.trim()}).filter(Boolean);
  if(!S.setupTitle.trim())return set({err:'Bitte einen Titel eingeben.'});
  if(opts.length<10)return set({err:'Bitte mindestens 10 Optionen eingeben.'});
  if(!S.setupPin||S.setupPin.length<4)return set({err:'Admin-PIN mind. 4 Zeichen.'});
  var s={title:S.setupTitle.trim(),adminPin:S.setupPin,currentRound:1,status:'voting',rounds:[
    {num:1,options:opts,status:'active',advanceTo:10,maxVotes:5,label:'Runde 1 - Alle '+opts.length+' Optionen (5 Stimmen)'},
    {num:2,options:[],status:'pending',advanceTo:5,maxVotes:3,label:'Runde 2 - Top 10 (3 Stimmen)'},
    {num:3,options:[],status:'pending',advanceTo:1,maxVotes:1,label:'Finale - Top 5 (1 Stimme)'}
  ]};
  saveS(s).then(function(){set({view:'admin',err:'',adminMsg:''})});
}

function doAdminLogin(){
  if(S.session&&S.pinInput===S.session.adminPin)set({view:'admin',err:'',adminMsg:''});
  else set({err:'Falsche PIN.'});
}

function doVote(){
  var max=currentMaxVotes();
  if(!S.voterName.trim())return set({err:'Bitte Namen eingeben.'});
  if(S.selected.length!==max)return set({err:'Bitte genau '+max+' Option'+(max>1?'en':'')+' auswaehlen.'});
  var nv=Object.assign({},S.votes);
  nv[S.voterName.trim()]=S.selected;
  saveV(nv,S.session.currentRound).then(function(){set({view:'done',err:''})});
}

function toggleOpt(o){
  var sel=S.selected;
  var max=currentMaxVotes();
  if(sel.indexOf(o)>=0)set({selected:sel.filter(function(x){return x!==o})});
  else if(sel.length<max)set({selected:sel.concat([o])});
}

function voteCounts(){
  if(!S.session)return[];
  var rd=S.session.rounds[S.session.currentRound-1],c={};
  (rd.options||[]).forEach(function(o){c[o]=0});
  Object.values(S.votes).forEach(function(p){p.forEach(function(o){c[o]=(c[o]||0)+1})});
  return Object.entries(c).sort(function(a,b){return b[1]-a[1]});
}

function doAdvance(){
  if(S.advancing)return;
  set({advancing:true, adminMsg:'Weiterleiten...'});

  // Capture current round BEFORE any state changes
  var oldRound = S.session.currentRound;
  var rd = S.session.rounds[oldRound-1];
  var top = voteCounts().slice(0, rd.advanceTo).map(function(x){return x[0]});
  var last = oldRound === S.session.rounds.length;

  var newRounds = S.session.rounds.map(function(r,i){
    if(i === oldRound-1) return Object.assign({},r,{status:'closed'});
    if(i === oldRound)   return Object.assign({},r,{options:top,status:'active'});
    return r;
  });

  var newSession = {
    title: S.session.title,
    adminPin: S.session.adminPin,
    currentRound: last ? oldRound : oldRound+1,
    status: last ? 'complete' : 'voting',
    rounds: newRounds
  };
  if(last) newSession.winner = top[0];

  sRef.set(newSession).then(function(){
    if(last){
      set({session:newSession, advancing:false, adminMsg:''});
    } else {
      var nextRound = oldRound+1;
      vRef(nextRound).once('value').then(function(sn){
        set({session:newSession, votes:sn.val()||{}, advancing:false, adminMsg:'Runde '+nextRound+' gestartet!'});
        setTimeout(function(){set({adminMsg:''})},3000);
      }).catch(function(e){
        set({session:newSession, votes:{}, advancing:false, adminMsg:'Runde gestartet, aber Fehler beim Laden der Stimmen: '+e.message});
      });
    }
  }).catch(function(e){
    set({advancing:false, adminMsg:'Fehler: '+e.message});
  });
}

function doReset(){
  if(!confirm('Gesamte Sitzung wirklich zuruecksetzen?'))return;
  Promise.all([sRef.remove(),vRef(1).remove(),vRef(2).remove(),vRef(3).remove()])
    .then(function(){set({session:null,votes:{},view:'home',msg:'Sitzung zurueckgesetzt.'})});
}

function goBallot(){
  if(!S.voterName.trim())return set({err:'Bitte Namen eingeben.'});
  if(S.votes[S.voterName.trim()])return set({err:'"'+S.voterName.trim()+'" hat bereits abgestimmt.'});
  set({selected:[],view:'ballot',err:''});
}

// DOM helpers
function el(tag,props,children){
  var e=document.createElement(tag);
  if(props)Object.entries(props).forEach(function(kv){
    var k=kv[0],v=kv[1];
    if(k==='cls')e.className=v;
    else if(k==='css')Object.assign(e.style,v);
    else if(k==='click'){if(v)e.addEventListener('click',v)}
    else if(k==='disabled'){if(v)e.disabled=true}
    else if(k==='tc')e.textContent=v;
    else e.setAttribute(k,v);
  });
  var ch=Array.isArray(children)?children:(children?[children]:[]);
  ch.forEach(function(c){
    if(c==null||c===false)return;
    e.appendChild(typeof c==='string'||typeof c==='number'?document.createTextNode(String(c)):c);
  });
  return e;
}

function mkBtn(label,cls,onClick,dis){
  var b=document.createElement('button');
  b.className='btn '+cls;
  b.textContent=label;
  if(dis)b.disabled=true;
  else if(onClick)b.addEventListener('click',onClick);
  return b;
}
function inp(type,ph,val,cb){
  var e=type==='textarea'?document.createElement('textarea'):document.createElement('input');
  if(type!=='textarea')e.type=type;
  e.placeholder=ph;e.value=val;
  e.addEventListener('input',function(ev){cb(ev.target.value)});
  return e;
}
function lbl(t){return el('label',{},[t])}
function errd(m){return m?el('div',{cls:'errmsg'},[m]):null}
function okd(m){return m?el('div',{cls:'okmsg'},[m]):null}
function txt(t){return document.createTextNode(t)}

function makeHeader(){
  var s=S.session,cr=s?s.rounds[s.currentRound-1]:null;
  var isActive=cr&&cr.status==='active'&&s&&s.status!=='complete';
  return el('div',{cls:'header'},[
    el('div',{cls:'logo'},[txt('Westend vernetzt - Abstimmung')]),
    s?el('div',{cls:'badge'+(isActive?' active':'')},
      [txt(s.status==='complete'?'Abgeschlossen':(cr?cr.label:''))]):el('span',{},[])
  ]);
}

function viewHome(){
  var s=S.session,cr=s?s.rounds[s.currentRound-1]:null,vc=Object.keys(S.votes).length;
  var card=el('div',{cls:'card',css:{textAlign:'center'}},[]);
  card.appendChild(el('h1',{},[txt('Westend vernetzt'),el('br',{}),[],txt('Aktionsreihe')]));
  card.appendChild(el('p',{cls:'proj-sub'},[txt('Es wird in drei Runden abgestimmt fuer den Titel und ggf. Slogan.')]));
  if(s){
    var subP=el('p',{cls:'sub'},[txt(s.title)]);
    subP.appendChild(el('br',{},[]));
    subP.appendChild(el('span',{css:{fontSize:'13px'}},[txt((cr?cr.label:'')+' - '+vc+' Stimme'+(vc!==1?'n':'')+' abgegeben')]));
    card.appendChild(subP);
  } else {
    card.appendChild(el('p',{cls:'sub'},[txt('Noch keine aktive Sitzung. Erstelle eine, um zu beginnen.')]));
  }
  if(S.msg)card.appendChild(okd(S.msg));
  var gap=el('div',{cls:'vgap'},[]);
  if(s){
    gap.appendChild(mkBtn('Jetzt abstimmen','btn-p',function(){set({view:'vote-name',selected:[],err:''})}));
    gap.appendChild(mkBtn('Admin-Bereich','btn-g',function(){set({view:'admin-login',err:'',pinInput:''})}));
    gap.appendChild(mkBtn('Aktualisieren','btn-g',function(){loadAll();set({msg:'Aktualisiert!'});setTimeout(function(){set({msg:''})},2000)}));
  } else {
    gap.appendChild(mkBtn('Neue Abstimmung erstellen','btn-p',function(){set({view:'setup',err:''})}));
    gap.appendChild(mkBtn('Aktualisieren','btn-g',function(){loadAll();set({msg:'Aktualisiert!'});setTimeout(function(){set({msg:''})},2000)}));
  }
  card.appendChild(gap);
  return el('div',{cls:'center'},[card]);
}

function viewSetup(){
  var oc=S.setupOptions.split('\n').map(function(x){return x.trim()}).filter(Boolean).length;
  var tI=inp('text','Westend vernetzt Aktionsreihe',S.setupTitle,function(v){S.setupTitle=v;draw()});
  var oT=inp('textarea','Option A\nOption B\n...',S.setupOptions,function(v){S.setupOptions=v;draw()});
  var pI=inp('password','PIN festlegen',S.setupPin,function(v){S.setupPin=v});
  var card=el('div',{cls:'card card-wide'},[]);
  card.appendChild(el('h2',{},[txt('Abstimmung erstellen')]));
  var ri=el('div',{cls:'round-info'},[]);
  ri.appendChild(el('strong',{},[txt('Rundenstruktur:')]));ri.appendChild(el('br',{},[]));
  ri.appendChild(txt('Runde 1: Alle Optionen - 5 Stimmen, Top 10 weiter'));ri.appendChild(el('br',{},[]));
  ri.appendChild(txt('Runde 2: Top 10 - 3 Stimmen, Top 5 weiter'));ri.appendChild(el('br',{},[]));
  ri.appendChild(txt('Finale: Top 5 - 1 Stimme, Gewinner wird bestimmt'));
  card.appendChild(ri);
  if(S.err)card.appendChild(errd(S.err));
  card.appendChild(lbl('Titel'));card.appendChild(tI);
  card.appendChild(lbl('Optionen - eine pro Zeile ('+oc+' eingegeben, mind. 10)'));card.appendChild(oT);
  card.appendChild(lbl('Admin-PIN (mind. 4 Zeichen)'));card.appendChild(pI);
  var row=el('div',{cls:'btn-row'},[]);
  row.appendChild(mkBtn('Zurueck','btn-g',function(){set({view:'home',err:''})}));
  row.appendChild(mkBtn('Abstimmung starten','btn-p',doCreate));
  card.appendChild(row);
  return el('div',{cls:'center'},[card]);
}

function viewAdminLogin(){
  var pI=inp('password','PIN eingeben',S.pinInput,function(v){S.pinInput=v});
  pI.addEventListener('keydown',function(e){if(e.key==='Enter')doAdminLogin()});
  var card=el('div',{cls:'card'},[]);
  card.appendChild(el('h2',{},[txt('Admin-Login')]));
  if(S.err)card.appendChild(errd(S.err));
  card.appendChild(lbl('Admin-PIN'));card.appendChild(pI);
  var row=el('div',{cls:'btn-row'},[]);
  row.appendChild(mkBtn('Zurueck','btn-g',function(){set({view:'home',err:''})}));
  row.appendChild(mkBtn('Entsperren','btn-p',doAdminLogin));
  card.appendChild(row);
  return el('div',{cls:'center'},[card]);
}

function viewAdmin(){
  var s=S.session;
  if(!s)return viewHome();

  var counts=voteCounts();
  var maxV=counts.length&&counts[0][1]>0?counts[0][1]:1;
  var cr=s.rounds[s.currentRound-1];
  var advTo=cr?cr.advanceTo:0;
  var maxVotes=cr?cr.maxVotes:1;
  var total=Object.keys(S.votes).length;
  var isLast=s.currentRound===s.rounds.length;
  var isDone=s.status==='complete';

  var card=el('div',{cls:'card card-wide'},[]);
  card.appendChild(el('h2',{css:{marginBottom:'10px'}},[txt('Admin - '+s.title)]));

  // Round badges
  var badges=el('div',{cls:'rbadges'},[]);
  s.rounds.forEach(function(r){
    var act=r.num===s.currentRound&&!isDone;
    var b=el('span',{cls:'rbadge'},[txt((r.status==='closed'?'ok ':'')+r.label)]);
    b.style.background=act?'#111':'#f0f0f0';
    b.style.border='1.5px solid '+(act?'#111':'#ddd');
    b.style.color=act?'#fff':r.status==='closed'?'#999':'#bbb';
    badges.appendChild(b);
  });
  card.appendChild(badges);

  if(S.adminMsg)card.appendChild(okd(S.adminMsg));

  if(isDone){
    var winDiv=el('div',{css:{textAlign:'center',padding:'20px 0'}},[]);
    winDiv.appendChild(el('div',{css:{fontSize:'48px',marginBottom:'12px'}},[txt('Gewonnen!')]));
    winDiv.appendChild(el('div',{cls:'wnm'},[txt(s.winner)]));
    var wp=el('p',{css:{color:'#666',marginBottom:'22px'}},[txt('Gewinner von ')]);
    wp.appendChild(el('strong',{},[txt(s.title)]));
    winDiv.appendChild(wp);
    winDiv.appendChild(mkBtn('Zuruecksetzen','btn-d btn-sm',doReset));
    card.appendChild(winDiv);
    var backDiv=el('div',{css:{marginTop:'18px',paddingTop:'16px',borderTop:'1px solid #eee'}},[]);
    backDiv.appendChild(mkBtn('Zurueck','btn-g btn-sm',function(){set({view:'home'})}));
    card.appendChild(backDiv);
    return el('div',{cls:'center'},[card]);
  }

  // Stats
  var stats=el('div',{cls:'stats'},[]);
  function mkStat(n,l){var d=el('div',{cls:'stat'},[]);d.appendChild(el('div',{cls:'n'},[txt(String(n))]));d.appendChild(el('div',{cls:'l'},[txt(l)]));return d;}
  stats.appendChild(mkStat(total,'Abgestimmt'));
  stats.appendChild(mkStat(cr&&cr.options?cr.options.length:0,'Optionen'));
  stats.appendChild(mkStat(advTo,'Kommen weiter'));
  stats.appendChild(mkStat(maxVotes,'Stimmen/Person'));
  card.appendChild(stats);

  // Tabs
  var tabs=el('div',{cls:'tabs'},[]);
  var t1=el('button',{cls:'tabBtn'+(S.tab==='results'?' on':'')},[txt('Live-Ergebnisse')]);
  t1.addEventListener('click',function(){set({tab:'results'})});
  var t2=el('button',{cls:'tabBtn'+(S.tab==='voters'?' on':'')},[txt('Abstimmende ('+total+')')]);
  t2.addEventListener('click',function(){set({tab:'voters'})});
  tabs.appendChild(t1);tabs.appendChild(t2);
  card.appendChild(tabs);

  // Tab content
  if(S.tab==='results'){
    var rlist=el('div',{cls:'rlist'},[]);
    if(counts.length===0){
      rlist.appendChild(el('p',{css:{color:'#aaa',fontSize:'14px',textAlign:'center',padding:'20px 0'}},[txt('Noch keine Stimmen.')]));
    } else {
      counts.forEach(function(item,i){
        var opt=item[0],n=item[1],adv=i<advTo;
        if(i===advTo){
          rlist.appendChild(el('hr',{cls:'cut'},[]));
          rlist.appendChild(el('div',{cls:'cutlbl'},[txt('-- Schnittlinie: Top '+advTo+' kommen weiter --')]));
          rlist.appendChild(el('hr',{cls:'cut'},[]));
        }
        var nameEl=el('span',{},[txt(opt)]);
        nameEl.style.opacity=adv?'1':'0.4';
        var fillEl=document.createElement('div');
        fillEl.className='rfill'+(adv?'':' elim');
        fillEl.style.width=((n/maxV)*100)+'%';
        var row=el('div',{cls:'rrow'},[
          el('div',{cls:'rnk'},[txt('#'+(i+1))]),
          el('div',{cls:'rbw'},[
            el('div',{cls:'rlbl'},[nameEl, el('span',{cls:'rvts'},[txt(n+' S')])]),
            el('div',{cls:'rbar'},[fillEl])
          ])
        ]);
        rlist.appendChild(row);
      });
    }
    card.appendChild(rlist);
    var btnRow=el('div',{cls:'btn-row'},[]);
    btnRow.appendChild(mkBtn('Aktualisieren','btn-g',loadAll));
    var advLabel=isLast?'Gewinner bestimmen':'Top '+advTo+' weiterleiten -> Runde '+(s.currentRound+1);
    var advBtn=mkBtn(advLabel,'btn-p',doAdvance,total===0||S.advancing);
    btnRow.appendChild(advBtn);
    card.appendChild(btnRow);
  } else {
    var chips=el('div',{cls:'chips'},[]);
    var voters=Object.keys(S.votes);
    if(voters.length===0){
      chips.appendChild(el('p',{css:{color:'#aaa',fontSize:'14px'}},[txt('Noch keine Stimmen.')]));
    } else {
      voters.forEach(function(n){
        chips.appendChild(el('span',{cls:'chip'},[txt('ok '+n)]));
      });
    }
    card.appendChild(chips);
    var resetDiv=el('div',{css:{marginTop:'18px'}},[]);
    resetDiv.appendChild(mkBtn('Sitzung zuruecksetzen','btn-d btn-sm',doReset));
    card.appendChild(resetDiv);
  }

  var backDiv2=el('div',{css:{marginTop:'18px',paddingTop:'16px',borderTop:'1px solid #eee'}},[]);
  backDiv2.appendChild(mkBtn('Zurueck zur Startseite','btn-g btn-sm',function(){set({view:'home'})}));
  card.appendChild(backDiv2);

  return el('div',{cls:'center'},[card]);
}

function viewVoteName(){
  var s=S.session,cr=s.rounds[s.currentRound-1];
  var nI=inp('text','Namen eingeben',S.voterName,function(v){S.voterName=v});
  nI.addEventListener('keydown',function(e){if(e.key==='Enter')goBallot()});
  var card=el('div',{cls:'card'},[]);
  card.appendChild(el('h2',{},[txt('Wer bist du?')]));
  var subP=el('p',{cls:'sub'},[txt(s.title)]);
  subP.appendChild(el('br',{},[]));
  subP.appendChild(el('span',{css:{fontSize:'13px'}},[txt(cr?cr.label:'')]));
  card.appendChild(subP);
  if(S.err)card.appendChild(errd(S.err));
  card.appendChild(lbl('Dein Name'));card.appendChild(nI);
  var row=el('div',{cls:'btn-row'},[]);
  row.appendChild(mkBtn('Zurueck','btn-g',function(){set({view:'home',err:''})}));
  row.appendChild(mkBtn('Weiter','btn-p',goBallot));
  card.appendChild(row);
  return el('div',{cls:'center'},[card]);
}

function viewBallot(){
  var s=S.session,cr=s.rounds[s.currentRound-1],opts=cr?cr.options:[];
  var max=currentMaxVotes();
  var card=el('div',{cls:'card card-wide'},[]);
  card.appendChild(el('h2',{},[txt('Jetzt abstimmen')]));
  var subP=el('p',{cls:'sub'},[txt(s.title+' - '+(cr?cr.label:''))]);
  subP.appendChild(el('br',{},[]));
  subP.appendChild(txt('Abstimmung als '));
  subP.appendChild(el('strong',{},[txt(S.voterName)]));
  card.appendChild(subP);
  if(S.err)card.appendChild(errd(S.err));
  var vctr=el('div',{cls:'vctr'},[]);
  vctr.appendChild(el('span',{cls:'big'},[txt(String(S.selected.length))]));
  vctr.appendChild(el('span',{cls:'sm'},[txt('von '+max+' Stimmen - noch '+(max-S.selected.length)+' uebrig')]));
  card.appendChild(vctr);
  var optsEl=el('div',{cls:'opts'},[]);
  opts.forEach(function(o){
    var isSel=S.selected.indexOf(o)>=0,isDim=!isSel&&S.selected.length===max;
    var chk=el('div',{cls:'chk'},[txt(isSel?'ok':'')]);
    var ob=document.createElement('button');
    ob.className='opt'+(isSel?' sel':'')+(isDim?' dim':'');
    ob.appendChild(chk);
    ob.appendChild(document.createTextNode(o));
    if(!isDim)ob.addEventListener('click',function(){toggleOpt(o)});
    optsEl.appendChild(ob);
  });
  card.appendChild(optsEl);
  var row=el('div',{cls:'btn-row'},[]);
  row.appendChild(mkBtn('Zurueck','btn-g',function(){set({view:'vote-name',err:''})}));
  row.appendChild(mkBtn(max+' Stimme'+(max>1?'n':'')+' abgeben','btn-p',doVote,S.selected.length!==max));
  card.appendChild(row);
  return el('div',{cls:'center'},[card]);
}

function viewDone(){
  var max=S.session?VOTES_PER_ROUND[S.session.currentRound-1]:1;
  var card=el('div',{cls:'card',css:{textAlign:'center'}},[]);
  card.appendChild(el('h2',{},[txt('Stimme'+(max>1?'n':'')+' abgegeben!')]));
  var p=el('p',{css:{color:'#666',marginBottom:'18px',marginTop:'12px'}},[txt('Danke, ')]);
  p.appendChild(el('strong',{},[txt(S.voterName)]));
  p.appendChild(txt('.'));
  card.appendChild(p);
  var picks=el('div',{cls:'picks'},[]);
  picks.appendChild(el('div',{cls:'plbl'},[txt('Deine Auswahl')]));
  S.selected.forEach(function(x){picks.appendChild(el('div',{cls:'pitem'},[txt('ok '+x)]))});
  card.appendChild(picks);
  card.appendChild(mkBtn('Zurueck zur Startseite','btn-g',function(){set({view:'home',voterName:'',selected:[]})}));
  return el('div',{cls:'center'},[card]);
}

function viewWinner(){
  var s=S.session;
  var card=el('div',{cls:'card',css:{textAlign:'center'}},[]);
  card.appendChild(el('h1',{css:{marginBottom:'8px'}},[txt('Gewinner!')]));
  card.appendChild(el('div',{cls:'wnm'},[txt(s.winner)]));
  card.appendChild(el('p',{css:{color:'#666',marginTop:'8px',marginBottom:'22px'}},[txt(s.title)]));
  card.appendChild(mkBtn('Admin-Bereich','btn-g',function(){set({view:'admin-login',pinInput:'',err:''})}));
  return el('div',{cls:'center'},[card]);
}

function draw(){
  var root=document.getElementById('root');
  root.innerHTML='';
  if(S.loading){root.appendChild(el('div',{cls:'loading'},[txt('Laden...')]));return}
  var s=S.session,v=S.view,content;
  try{
    if(s&&s.status==='complete'&&v!=='admin')content=viewWinner();
    else if(v==='home')       content=viewHome();
    else if(v==='setup')      content=viewSetup();
    else if(v==='admin-login')content=viewAdminLogin();
    else if(v==='admin')      content=viewAdmin();
    else if(v==='vote-name')  content=viewVoteName();
    else if(v==='ballot')     content=viewBallot();
    else if(v==='done')       content=viewDone();
    else                      content=viewHome();
  }catch(e){
    var errCard=el('div',{cls:'card'},[]);
    errCard.appendChild(el('h2',{},[txt('Fehler')]));
    errCard.appendChild(el('p',{css:{color:'#c00',marginBottom:'16px'}},[txt(e.message||'Unbekannter Fehler')]));
    errCard.appendChild(mkBtn('Zurueck zur Startseite','btn-g',function(){set({view:'home',err:''})}));
    content=el('div',{cls:'center'},[errCard]);
  }
  var app=el('div',{cls:'app'},[]);
  app.appendChild(makeHeader());
  app.appendChild(content);
  root.appendChild(app);
}

loadAll();
</script>
</body>
</html>
