<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Session Reparatur</title>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey: "AIzaSyA5uKZiAi-xBkPxqNRIAohT5aTgI1L3mxs",
  authDomain: "abstimmung---wv-aktionsreihe.firebaseapp.com",
  databaseURL: "https://abstimmung---wv-aktionsreihe-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "abstimmung---wv-aktionsreihe",
  storageBucket: "abstimmung---wv-aktionsreihe.firebasestorage.app",
  messagingSenderId: "25982286784",
  appId: "1:25982286784:web:2e3934367e72ac8a11e625"
});
const db = firebase.database();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;font-family:system-ui,sans-serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:36px;max-width:560px;width:100%;box-shadow:0 2px 20px rgba(0,0,0,.08)}
h2{font-size:20px;font-weight:700;margin-bottom:8px}
p{color:#555;font-size:14px;line-height:1.6;margin-bottom:20px}
.status{background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:10px;padding:14px;font-size:13px;margin-bottom:20px;line-height:1.7}
.status strong{color:#111}
.btn{display:block;width:100%;padding:13px;border-radius:10px;border:none;cursor:pointer;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;transition:all .15s}
.btn-p{background:#111;color:#fff}
.btn-p:hover:not(:disabled){background:#333}
.btn-p:disabled{background:#ccc;cursor:not-allowed}
.btn-d{background:transparent;border:1.5px solid #c00;color:#c00;margin-top:10px}
.ok{background:#f0f8f0;border:1.5px solid #bdb;border-radius:8px;padding:12px;color:#262;font-size:13px;margin-bottom:16px}
.err{background:#fff0f0;border:1.5px solid #fcc;border-radius:8px;padding:12px;color:#c00;font-size:13px;margin-bottom:16px}
.opts{display:flex;flex-direction:column;gap:6px;margin-bottom:20px}
.opt-item{background:#f7f7f7;border:1.5px solid #e0e0e0;border-radius:8px;padding:10px 14px;font-size:14px;display:flex;justify-content:space-between}
.votes{font-weight:700;color:#111}
</style>
</head>
<body>
<div class="card">
  <h2>Runde 4 hinzufuegen</h2>
  <p>Dieses Tool liest die aktuellen Ergebnisse aus Runde 3, fuegt eine neue Finalrunde mit den Top 2 hinzu und startet sie.</p>
  <div id="status" class="status">Verbinde mit Firebase...</div>
  <div id="msg"></div>
  <div id="top2-preview" style="display:none">
    <p style="margin-bottom:8px"><strong>Top 2 fuer die Finalrunde:</strong></p>
    <div class="opts" id="top2-list"></div>
  </div>
  <button class="btn btn-p" id="btn-patch" disabled>Runde 4 starten</button>
</div>
<script>
var sRef = db.ref('westend/session');
var session = null;
var top2 = [];

function showMsg(text, type) {
  var d = document.getElementById('msg');
  d.innerHTML = '<div class="' + type + '">' + text + '</div>';
}

sRef.once('value').then(function(sn) {
  session = sn.val();
  var statusEl = document.getElementById('status');
  if (!session) {
    statusEl.innerHTML = '<strong>Keine aktive Session gefunden.</strong>';
    return;
  }
  var cr = session.currentRound;
  var rd = session.rounds[cr - 1];
  statusEl.innerHTML =
    '<strong>Session:</strong> ' + session.title + '<br>' +
    '<strong>Aktuelle Runde:</strong> ' + cr + ' – ' + rd.label + '<br>' +
    '<strong>Status:</strong> ' + session.status + '<br>' +
    '<strong>Runden gesamt:</strong> ' + session.rounds.length;

  // Load votes for current round and compute top 2
  db.ref('westend/votes/r' + cr).once('value').then(function(vn) {
    var votes = vn.val() || {};
    var counts = {};
    (rd.options || []).forEach(function(o) { counts[o] = 0; });
    Object.values(votes).forEach(function(picks) {
      picks.forEach(function(o) { counts[o] = (counts[o] || 0) + 1; });
    });
    var sorted = Object.entries(counts).sort(function(a, b) { return b[1] - a[1]; });
    top2 = sorted.slice(0, 2).map(function(x) { return x[0]; });

    var listEl = document.getElementById('top2-list');
    sorted.slice(0, 2).forEach(function(item, i) {
      listEl.innerHTML += '<div class="opt-item">' +
        '<span>#' + (i+1) + ' ' + item[0] + '</span>' +
        '<span class="votes">' + item[1] + ' S</span></div>';
    });
    document.getElementById('top2-preview').style.display = 'block';
    document.getElementById('btn-patch').disabled = false;
  });
});

document.getElementById('btn-patch').addEventListener('click', function() {
  if (!session || top2.length < 2) return;
  var btn = document.getElementById('btn-patch');
  btn.disabled = true;
  btn.textContent = 'Wird gespeichert...';

  var cr = session.currentRound;

  // Mark current round as closed, add round 4
  var newRounds = session.rounds.map(function(r, i) {
    if (i === cr - 1) return Object.assign({}, r, { status: 'closed' });
    return r;
  });

  // Add round 4 if it doesn't exist yet
  if (newRounds.length < 4) {
    newRounds.push({
      num: 4,
      options: top2,
      status: 'active',
      advanceTo: 1,
      maxVotes: 1,
      label: 'Finale – Top 2 (1 Stimme)'
    });
  } else {
    // Update existing round 4
    newRounds[3] = Object.assign({}, newRounds[3], {
      options: top2, status: 'active'
    });
  }

  var newSession = Object.assign({}, session, {
    currentRound: 4,
    status: 'voting',
    rounds: newRounds
  });
  delete newSession.winner;

  sRef.set(newSession).then(function() {
    showMsg('Runde 4 wurde gestartet mit: <strong>' + top2[0] + '</strong> und <strong>' + top2[1] + '</strong>.<br>Du kannst dieses Fenster schliessen und zur Abstimmungsseite wechseln.', 'ok');
    btn.textContent = 'Fertig!';
  }).catch(function(e) {
    showMsg('Fehler: ' + e.message, 'err');
    btn.disabled = false;
    btn.textContent = 'Runde 4 starten';
  });
});
</script>
</body>
</html>
